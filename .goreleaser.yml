version: 2

project_name: micepad

builds:
  - main: .
    binary: micepad
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^ci:"

release:
  github:
    owner: micepadteam
    name: micepad-cli
  # Source code lives in micepad-cli-dev (private).
  # Releases are published here to micepad-cli (public).
  extra_files:
    - glob: scripts/install.sh
